<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> 💵 Bet Bet Bet 💵</title>
  <style>
    :root {
      --clr-black: black;
      --clr-white: white;
      --clr-obnoxious-orange: orange; 
      --clr-obnoxious-red: red; 
      --clr-obnoxious-green: rgb(0, 255, 0); 
      --clr-dark: #223;
      --clr-light: #fee;
    }

    html, body {
      margin: 0;
    }
    h1, h2, h3, h4, h5, h6 {
      margin: 0;
    }
    main {
      min-height: 100dvh;
      min-width: 100dvw;
      background-color: black;
      background-image: url(https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNWNieXdzY3Y5MG1jd25qbDJkazZpYTlwamV3Znk0aGxiOGhsbzV2NSZlcD12MV9naWZzX3NlYXJjaCZjdD1n/ppGcc52neY1fKtxTnh/giphy.gif);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.25rem;
    }

    .card {
      background-color: orange;
      background-image: url(./Basketball.webp);
      background-repeat: repeat;
      height: 100dvh;
      max-width: 360px;
    }

    .card div {
      padding: 20px;
    }
    
    h1, p {
      text-shadow: 3px 3px 2px black;
      background-color: rgb(255, 64, 0);
      padding: 8px;
      color: var(--clr-obnoxious-green);
    }
    
    button {
      cursor: pointer;
      font: inherit;
      /* width: 80px; */
      /* width: ; */
      height: 40px;
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <div>
        <h1>Sports Fans!</h1>
    
        <p>The month is here! Let's do some betting!</p>
        
        <button id="btn-lets-go">
          TAKE MY MONEY
        </button>
      </div>
    </section>
  </main>

  <script>
    document.querySelector("#btn-lets-go").addEventListener("click", (ev) => {
      prompt("Enter your credit cards")
    });
  </script>
</body>
</html>
